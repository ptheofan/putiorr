name: PR Container

# Builds a Docker image for each pull request and pushes it to GHCR so the
# change can be pulled and run without a release. Images are tagged:
#   ghcr.io/<owner>/<repo>:pr-<number>          (moving — always the latest push)
#   ghcr.io/<owner>/<repo>:pr-<number>-<sha>    (immutable — a specific commit)
#
# Note: only same-repository PRs can push (fork PRs have no registry write access).

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: pr-container-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish PR image
    runs-on: ubuntu-latest
    # Fork PRs cannot access the registry token; skip them instead of failing.
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-${{ github.event.pull_request.number }}-,format=short

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment pull instructions
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const image = `${process.env.REGISTRY}/${process.env.IMAGE_NAME}`.toLowerCase();
            const tag = `pr-${context.payload.pull_request.number}`;
            const body = [
              '🐳 **PR image published**',
              '',
              '```bash',
              `docker pull ${image}:${tag}`,
              '```',
              '',
              `Updated on every push to this PR. Immutable per-commit tags are also published as \`${tag}-<short-sha>\`.`,
              '',
              `If the package is private, authenticate first: \`docker login ${process.env.REGISTRY}\`.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
